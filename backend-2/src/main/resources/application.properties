# ========================================
# Backend #2 — AI & Integration Service
# ========================================

# Server
server.port=8081

# ========================================
# Backend #1 Integration
# ========================================
backend1.url=http://localhost:8080
backend1.username=ai-agent
backend1.password=ai-agent-secret

# ========================================
# OpenAI Configuration
# ========================================
# Set OPENAI_API_KEY environment variable, or leave empty for fallback mode
openai.api.key=${OPENAI_API_KEY:}
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-3.5-turbo
openai.max-tokens=500
openai.temperature=0.7

# ========================================
# Email Notifications (SMTP)
# ========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
notification.from=${NOTIFICATION_FROM:noreply@ai-support.com}
notification.enabled=${NOTIFICATION_ENABLED:false}

# ========================================
# Logging
# ========================================
logging.level.org.example.backend2=DEBUG
logging.level.org.springframework.web.reactive.function.client=DEBUG
